server.port=8000

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ovs_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations
ovs.app.jwtSecret=OneVendorSolutionsSecretKeyForJWTHasToBeLongEnoughToMeetSecurityRequirements2026!
ovs.app.jwtExpirationMs=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=onevendorsolutions@gmail.com
spring.mail.password=mockapppassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Max File Upload Size Config
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
