<!-- Custom Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Password toggle logic
            const togglePass = document.querySelector('button[type="button"] span[data-icon="visibility"]');
            const passInput = document.getElementById('password');
            
            if (togglePass && passInput) {
                togglePass.parentElement.addEventListener('click', () => {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    togglePass.textContent = type === 'password' ? 'visibility' : 'visibility_off';
                });
            }

            // Input focus styles enhancement
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('label')?.classList.add('text-secondary');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('label')?.classList.remove('text-secondary');
                });
            });
        });
    </script>
