<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | One Vendor Solutions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#b2c7ef",
                    "on-primary": "#ffffff",
                    "secondary": "#735c00",
                    "on-primary-container": "#768baf",
                    "error": "#ba1a1a",
                    "background": "#f6faff",
                    "surface": "#f6faff",
                    "on-background": "#0e1d27",
                    "on-secondary-fixed-variant": "#574500",
                    "surface-container": "#e0f0fe",
                    "surface-dim": "#ccdcea",
                    "tertiary-container": "#202325",
                    "secondary-fixed-dim": "#e9c349",
                    "inverse-surface": "#24323d",
                    "primary-container": "#0a2342",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#e1e2e4",
                    "outline": "#74777e",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#44474e",
                    "on-primary-fixed": "#021c3a",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#c5c7c8",
                    "surface-bright": "#f6faff",
                    "surface-variant": "#d5e4f2",
                    "tertiary": "#0a0d0f",
                    "secondary-fixed": "#ffe088",
                    "on-secondary-container": "#745c00",
                    "surface-container-low": "#ebf5ff",
                    "on-secondary-fixed": "#241a00",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#888a8c",
                    "inverse-on-surface": "#e5f2ff",
                    "error-container": "#ffdad6",
                    "on-surface": "#0e1d27",
                    "inverse-primary": "#b2c7ef",
                    "on-primary-fixed-variant": "#324768",
                    "surface-tint": "#4a5f81",
                    "outline-variant": "#c4c6cf",
                    "on-tertiary-fixed": "#191c1e",
                    "surface-container-highest": "#d5e4f2",
                    "secondary-container": "#fed65b",
                    "primary-fixed": "#d5e3ff",
                    "primary": "#000d22",
                    "on-tertiary-fixed-variant": "#444749",
                    "on-error": "#ffffff",
                    "surface-container-high": "#daeaf8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "sm": "12px",
                    "container-max": "1280px",
                    "base": "8px",
                    "gutter": "24px",
                    "md": "24px",
                    "lg": "48px",
                    "xl": "80px"
            },
            "fontFamily": {
                    "body-lg": ["Montserrat"],
                    "label-md": ["Montserrat"],
                    "headline-md": ["Montserrat"],
                    "headline-lg-mobile": ["Montserrat"],
                    "headline-lg": ["Montserrat"],
                    "title-lg": ["Montserrat"],
                    "display-lg": ["Montserrat"],
                    "body-md": ["Montserrat"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a2342;
            overflow: hidden;
        }

        .gold-pattern {
            background-image: radial-gradient(#D4AF37 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.15;
        }

        .animated-gradient {
            background: linear-gradient(135deg, #000d22 0%, #0a2342 50%, #1a3a5f 100%);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0px 4px 20px rgba(10, 35, 66, 0.08);
        }

        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-20px) scale(0.85);
            color: #735c00;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center animated-gradient relative">
<!-- Decorative Elements -->
<div class="absolute inset-0 gold-pattern pointer-events-none"></div>
<div class="absolute top-0 right-0 w-96 h-96 bg-secondary-fixed opacity-5 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary-fixed-dim opacity-10 blur-[120px] rounded-full -translate-x-1/2 translate-y-1/2"></div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-gutter">
<!-- Centerpiece Login Card -->
<div class="glass-card rounded-xl p-lg flex flex-col items-center transition-all duration-500 hover:shadow-2xl">
<!-- Brand Identity -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center gap-2 mb-sm">
<span class="material-symbols-outlined text-secondary text-4xl" data-weight="fill">shield_person</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">One Vendor</h1>
</div>
<div class="h-0.5 w-12 bg-secondary-fixed-dim mx-auto mb-4"></div>
<h2 class="font-title-lg text-title-lg text-on-surface-variant font-medium">Admin Login</h2>
<p class="font-label-md text-label-md text-on-tertiary-container mt-1 uppercase tracking-widest">Procurement Oversight</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-md" id="loginForm">
<!-- Email Field -->
<div class="relative floating-label-input flex flex-col">
<input class="peer w-full px-4 py-3 bg-surface border-b-2 border-outline-variant/30 text-on-surface focus:border-secondary focus:ring-0 transition-all outline-none rounded-t-lg" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute left-4 top-3.5 font-label-md text-label-md text-on-surface-variant pointer-events-none transition-all duration-200" for="email">
                        Work Email
                    </label>
<div class="absolute right-4 top-3.5 text-on-surface-variant/40">
<span class="material-symbols-outlined text-sm">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="relative floating-label-input flex flex-col">
<input class="peer w-full px-4 py-3 bg-surface border-b-2 border-outline-variant/30 text-on-surface focus:border-secondary focus:ring-0 transition-all outline-none rounded-t-lg" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute left-4 top-3.5 font-label-md text-label-md text-on-surface-variant pointer-events-none transition-all duration-200" for="password">
                        Admin Password
                    </label>
<div class="absolute right-4 top-3.5 text-on-surface-variant/40">
<span class="material-symbols-outlined text-sm">lock</span>
</div>
</div>
<!-- Controls -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center group cursor-pointer">
<input class="hidden peer" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant rounded peer-checked:bg-secondary peer-checked:border-secondary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-[14px] hidden peer-checked:block">check</span>
</div>
<span class="ml-2 font-body-md text-body-md text-on-surface-variant group-hover:text-primary transition-colors">Remember device</span>
</label>
<a class="font-label-md text-label-md text-secondary hover:text-on-secondary-fixed-variant transition-colors hover:underline" href="#">
                        Forgot Password?
                    </a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-title-lg text-title-lg shadow-lg flex items-center justify-center gap-2 group relative overflow-hidden transition-all duration-300 active:scale-[0.98]" type="submit">
<div class="absolute inset-0 bg-secondary translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out -z-10"></div>
<span class="group-hover:text-on-secondary transition-colors duration-300">Login to Dashboard</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 group-hover:text-on-secondary transition-all">arrow_forward</span>
</button>
</form>
<!-- Footer / Meta -->
<div class="mt-xl text-center space-y-4">
<p class="font-label-md text-label-md text-on-tertiary-container flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">security</span>
                    Secured by Supabase Auth
                </p>
<div class="flex items-center justify-center gap-4 text-xs font-label-md text-on-surface-variant/60 uppercase tracking-widest border-t border-outline-variant/10 pt-4">
<a class="hover:text-secondary transition-colors" href="#">Security Policy</a>
<span class="w-1 h-1 bg-outline-variant/40 rounded-full"></span>
<a class="hover:text-secondary transition-colors" href="#">Contact Admin</a>
</div>
</div>
</div>
<!-- System Message -->
<div class="hidden mt-4 bg-error-container text-on-error-container p-4 rounded-lg font-body-md text-body-md flex items-start gap-3 border border-error/20 animate-pulse" id="statusMessage">
<span class="material-symbols-outlined">error</span>
<p>Authentication failed. Please verify your admin credentials and try again.</p>
</div>
</main>
<!-- Micro-interactions Script -->
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Validating...`;
            
            // Mock authentication delay
            setTimeout(() => {
                const status = document.getElementById('statusMessage');
                status.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = originalText;
                
                // Shake effect on error
                const card = document.querySelector('.glass-card');
                card.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => card.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
            }, 1200);
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
